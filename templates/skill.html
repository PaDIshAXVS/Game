<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ skill_name }}</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #15161d;
            --text-main: #ffffff;
            --text-muted: #8b8c9a;
            --accent-color: #00ffcc; 
            --secondary-accent: #89b4fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            user-select: none; -webkit-user-select: none;
        }

        .nav-header { display: flex; align-items: center; margin-bottom: 25px; gap: 15px; }

        .back-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main); width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer;
        }

        .skill-title { font-size: 24px; font-weight: 700; }

        .stats-card {
            background-color: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .level-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px; }
        .level-badge { font-weight: bold; background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 8px;}

        .progress-track { background-color: rgba(255, 255, 255, 0.05); border-radius: 8px; height: 10px; width: 100%; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; border-radius: 8px; width: 0%; transition: width 1s ease-out; }

        .xp-text { text-align: right; font-size: 13px; color: var(--text-muted); font-family: monospace; }
        .section-title { font-size: 18px; margin-bottom: 15px; color: var(--text-muted); }
        .islands-container { display: flex; flex-direction: column; gap: 12px; }

        .island-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; opacity: 0; animation: slideUp 0.4s forwards; transition: all 0.3s;
        }
        .island-card:active { background: rgba(255, 255, 255, 0.05); }

        /* Эффект зачеркивания для пройденных островов */
        .island-card.completed-island {
            opacity: 0.5;
            background: rgba(255, 255, 255, 0.01);
            border-color: rgba(0, 255, 204, 0.2);
        }
        .island-card.completed-island .island-name {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .island-name { font-size: 16px; font-weight: 500; transition: color 0.3s; }
        .nodes-count { font-size: 13px; color: var(--secondary-accent); background: rgba(137, 180, 250, 0.1); padding: 4px 8px; border-radius: 6px; }

        .add-form { display: flex; margin-top: 20px; gap: 10px; margin-bottom: 30px; }
        .add-input { flex: 1; background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main); padding: 12px 16px; border-radius: 12px; font-size: 15px; outline: none; }
        .add-input:focus { border-color: var(--secondary-accent); }
        .add-btn { background: var(--secondary-accent); color: #000; border: none; width: 48px; border-radius: 12px; font-weight: bold; font-size: 24px; cursor: pointer; }

        .delete-skill-btn {
            background: rgba(255, 60, 60, 0.05); color: #ff4d4d; border: 1px solid rgba(255, 60, 60, 0.15);
            width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .delete-skill-btn:active { background: rgba(255, 60, 60, 0.2); transform: scale(0.98); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .empty-state { text-align: center; color: var(--text-muted); margin: 30px 0; font-size: 14px; }

        .add-xp-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-xp-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <button class="back-btn" onclick="window.location.href='/user/{{ telegram_id }}'">←</button>
        <div class="skill-title">{{ skill_name }}</div>
    </div>

    <div class="stats-card">
        <div class="level-header">
            <span>Прогресс</span>
            <span class="level-badge">Lvl {{ level }}</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" data-width="{{ xp_percent }}"></div>
        </div>
        <div class="xp-text">{{ xp_text }} XP</div>
        
        <button class="add-xp-btn" onclick="addBonusXP()">+10 XP</button>
    </div>

    <div class="section-title">Острова (Модули)</div>
    
    <div class="islands-container">
        {% for island in islands %}
        <!-- Если в бэкенде передается is_completed, остров будет красиво зачеркнут -->
        <div class="island-card {% if island.is_completed %}completed-island{% endif %}" data-delay="{{ loop.index0 * 0.1 }}" 
             onclick="window.location.href='/user/{{ telegram_id }}/skill/{{ skill_id }}/island/{{ island.id }}'">
            <div class="island-name">{{ island.name }}</div>
            <div class="nodes-count">{{ island.nodes_count }} нодов</div>
        </div>
        {% else %}
        <div class="empty-state">У этого навыка пока нет островов.</div>
        {% endfor %}
    </div>

    <div class="add-form">
        <input type="text" id="newIslandName" class="add-input" placeholder="Название острова...">
        <button class="add-btn" onclick="createNewIsland()">+</button>
    </div>

    <button class="delete-skill-btn" onclick="deleteSkill()">Удалить этот навык</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        function getLevelStyles(level) {
            if (level < 10) return { bg: '#8b8c9a', shadow: 'none' }; 
            if (level < 20) return { bg: '#a6e3a1', shadow: '0 0 8px rgba(166,227,161,0.5)' }; 
            if (level < 30) return { bg: '#89b4fa', shadow: '0 0 8px rgba(137,180,250,0.5)' }; 
            if (level < 40) return { bg: '#00ffcc', shadow: '0 0 10px rgba(0,255,204,0.5)' };  
            if (level < 50) return { bg: '#cba6f7', shadow: '0 0 10px rgba(203,166,247,0.5)' }; 
            if (level < 60) return { bg: '#f5c2e7', shadow: '0 0 10px rgba(245,194,231,0.5)' }; 
            if (level < 70) return { bg: '#f9e2af', shadow: '0 0 10px rgba(249,226,175,0.5)' }; 
            if (level < 80) return { bg: '#fab387', shadow: '0 0 10px rgba(250,179,135,0.5)' }; 
            if (level < 90) return { bg: '#f38ba8', shadow: '0 0 10px rgba(243,139,168,0.5)' }; 
            if (level < 100) return { bg: '#eba0ac', shadow: '0 0 12px rgba(235,160,172,0.6)' }; 
            
            if (level < 150) return { bg: 'linear-gradient(90deg, #ff007f, #7928ca, #00ffcc)', shadow: '0 0 15px rgba(121,40,202,0.7)' };
            return { bg: 'linear-gradient(270deg, #ff00cc, #3333ff, #00ffcc, #ff00cc)', shadow: '0 0 20px rgba(51,51,255,0.8)' };
        }

        document.querySelectorAll('.island-card').forEach(card => {
            const delay = card.getAttribute('data-delay');
            if (delay) card.style.animationDelay = delay + 's';
        });

        setTimeout(() => {
            const fill = document.querySelector('.progress-fill');
            fill.style.width = fill.getAttribute('data-width') + '%';
        }, 150);

        async function createNewIsland() {
            const input = document.getElementById('newIslandName');
            const islandName = input.value.trim();
            if (!islandName) return;

            try {
                const response = await fetch(`/user/{{ telegram_id }}/skill/{{ skill_id }}/add_island`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: islandName })
                });
                if (response.ok) window.location.reload();
                else alert("Ошибка при создании острова");
            } catch (e) { console.error(e); }
        }

        function deleteSkill() {
            tg.showConfirm("Точно хочешь удалить этот навык и все его острова?", async function(confirmed) {
                if (confirmed) {
                    try {
                        const response = await fetch(`/user/{{ telegram_id }}/skill/{{ skill_id }}`, { method: 'DELETE' });
                        if (response.ok) window.location.href = '/user/{{ telegram_id }}';
                        else alert("Ошибка удаления");
                    } catch (e) { console.error(e); }
                }
            });
        }

        async function addBonusXP() {
            try {
                const response = await fetch(`/user/{{ telegram_id }}/skill/{{ skill_id }}/add_xp`, {
                    method: 'POST'
                });
                if (response.ok) { window.location.reload(); } 
                else { alert("Ошибка при начислении опыта"); }
            } catch (e) { console.error("Fetch error:", e); }
        }

        function applyLevelColors() {
            const level = parseInt('{{ level }}');
            const fill = document.querySelector('.progress-fill');
            const badge = document.querySelector('.level-badge');
            const styles = getLevelStyles(level);

            fill.style.background = styles.bg;
            fill.style.boxShadow = styles.shadow;
            
            if (styles.bg.includes('gradient')) {
                badge.style.background = styles.bg;
                badge.style.webkitBackgroundClip = 'text';
                badge.style.webkitTextFillColor = 'transparent';
                badge.style.backgroundSize = '300% 300%';
                badge.style.animation = 'gradientShift 4s ease infinite';
                fill.style.backgroundSize = '300% 300%';
                fill.style.animation = 'gradientShift 4s ease infinite';
            } else {
                badge.style.color = styles.bg;
            }
        }

        applyLevelColors();
    </script>
</body>
</html>
