<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ name }}</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #15161d;
            --text-main: #ffffff;
            --text-muted: #8b8c9a;
            --accent-color: #00ffcc; 
            --secondary-accent: #f9e2af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px;
            user-select: none; -webkit-user-select: none;
        }

        .nav-header { display: flex; align-items: center; margin-bottom: 25px; gap: 15px; }
        .back-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main); width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer;
        }

        .island-title { font-size: 24px; font-weight: 700; }
        .section-title { font-size: 16px; margin-bottom: 15px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .nodes-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        
        .node-item {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 16px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between;
            transition: all 0.2s ease;
        }

        .node-left { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        
        .checkbox-container {
            width: 22px; height: 22px; border: 2px solid var(--text-muted);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        
        .node-item.completed .checkbox-container {
            border-color: var(--accent-color); background: var(--accent-color);
        }
        .node-item.completed .checkbox-container::after {
            content: "✓"; color: #000; font-size: 14px; font-weight: bold;
        }

        .node-name { font-size: 16px; transition: all 0.2s; }
        .node-item.completed .node-name { color: var(--text-muted); text-decoration: line-through; }

        .delete-node-btn {
            background: transparent; border: none; color: #ff4d4d; font-size: 18px;
            cursor: pointer; padding: 4px; opacity: 0.5; transition: opacity 0.2s;
        }
        .delete-node-btn:hover { opacity: 1; }

        .add-form { display: flex; gap: 10px; margin-bottom: 30px; }
        .add-input { flex: 1; background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main); padding: 12px 16px; border-radius: 12px; font-size: 15px; outline: none; }
        .add-input:focus { border-color: var(--secondary-accent); }
        .add-btn { background: var(--secondary-accent); color: #000; border: none; width: 48px; border-radius: 12px; font-weight: bold; font-size: 24px; cursor: pointer; }

        .delete-island-btn {
            background: rgba(255, 60, 60, 0.05); color: #ff4d4d; border: 1px solid rgba(255, 60, 60, 0.15);
            width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer;
        }
        .delete-island-btn:active { background: rgba(255, 60, 60, 0.2); transform: scale(0.98); }
        
        .empty-state { text-align: center; color: var(--text-muted); margin: 30px 0; font-size: 14px; }
    </style>
</head>
<body>

    <div class="nav-header">
        <button class="back-btn" onclick="window.location.href='/user/{{ telegram_id }}/skill/{{ skill_id }}'">←</button>
        <div class="island-title">{{ name }}</div>
    </div>

    <div class="section-title">Задачи (Ноды)</div>

    <div class="nodes-list">
        {% for node in nodes %}
        <div class="node-item {% if node.is_completed %}completed{% endif %}">
            <div class="node-left" onclick="completeNode('{{ node.id }}', '{{ node.is_completed | tojson }}')">
                <div class="checkbox-container"></div>
                <span class="node-name">{{ node.name }}</span>
            </div>
            <button class="delete-node-btn" onclick="deleteNode('{{ node.id }}')">✕</button>
        </div>
        {% else %}
        <div class="empty-state">На этом острове пока нет задач.</div>
        {% endfor %}
    </div>

    <div class="add-form">
        <input type="text" id="newNodeName" class="add-input" placeholder="Добавить шаг...">
        <button class="add-btn" onclick="createNewNode()">+</button>
    </div>

    <button class="delete-island-btn" onclick="deleteIsland()">Удалить этот модуль</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        async function createNewNode() {
            const input = document.getElementById('newNodeName');
            const nodeName = input.value.trim();
            if (!nodeName) return;

            try {
                const response = await fetch(`/user/{{ telegram_id }}/skill/{{ skill_id }}/island/{{ island_id }}/add_node`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nodeName })
                });
                if (response.ok) window.location.reload();
            } catch (e) { console.error(e); }
        }

        async function completeNode(nodeId, isCompleted) {
            if (isCompleted === true || isCompleted === 'true') return; 

            try {
                const response = await fetch(`/user/{{ telegram_id }}/skill/{{ skill_id }}/island/{{ island_id }}/node/${nodeId}/complete`, {
                    method: 'POST'
                });
                if (response.ok) window.location.reload();
            } catch (e) { console.error(e); }
        }

        function deleteNode(nodeId) {
            tg.showConfirm("Удалить эту задачу?", async function(confirmed) {
                if (confirmed) {
                    try {
                        const response = await fetch(`/user/{{ telegram_id }}/skill/{{ skill_id }}/island/{{ island_id }}/node/${nodeId}`, {
                            method: 'DELETE'
                        });
                        if (response.ok) window.location.reload();
                    } catch (e) { console.error(e); }
                }
            });
        }

        function deleteIsland() {
            tg.showConfirm("Точно хочешь удалить этот остров и все его ноды?", async function(confirmed) {
                if (confirmed) {
                    try {
                        const response = await fetch(`/user/{{ telegram_id }}/skill/{{ skill_id }}/island/{{ island_id }}`, {
                            method: 'DELETE'
                        });
                        if (response.ok) window.location.href = '/user/{{ telegram_id }}/skill/{{ skill_id }}';
                    } catch (e) { console.error(e); }
                }
            });
        }
    </script>
</body>
</html>
