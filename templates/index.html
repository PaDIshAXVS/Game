<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Профиль Игрока</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #15161d;
            --text-main: #ffffff;
            --text-muted: #8b8c9a;
            --accent-color: #00ffcc; 
            --accent-glow: rgba(0, 255, 204, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            user-select: none; 
            -webkit-user-select: none;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }

        .stats-badge {
            background: rgba(255, 255, 255, 0.05); padding: 6px 12px; border-radius: 20px;
            font-size: 14px; color: var(--text-muted); border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .skills-container { display: flex; flex-direction: column; gap: 16px; }

        .skill-card {
            background-color: var(--card-bg); border-radius: 16px; padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.03); opacity: 0;
            animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .skill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .skill-name { font-size: 17px; font-weight: 600; }
        .skill-level { font-size: 14px; font-weight: 700; border-radius: 8px; padding: 4px 10px; background: rgba(255, 255, 255, 0.05); }

        .progress-track {
            background-color: rgba(255, 255, 255, 0.05); border-radius: 8px;
            height: 8px; width: 100%; overflow: hidden; position: relative; margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%; border-radius: 8px; width: 0%; 
            transition: width 1s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .skill-xp-text { display: flex; justify-content: flex-end; font-size: 12px; color: var(--text-muted); font-family: monospace; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .empty-state { text-align: center; color: var(--text-muted); margin-top: 50px; font-size: 15px; }

        .add-skill-container { display: flex; margin-top: 20px; gap: 10px; animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .add-skill-input { flex: 1; background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main); padding: 14px 16px; border-radius: 12px; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .add-skill-input:focus { border-color: var(--accent-color); }
        .add-skill-btn { background: var(--accent-color); color: #000; border: none; width: 50px; border-radius: 12px; font-weight: bold; font-size: 24px; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; }
        .add-skill-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Сводка</h1>
        <div class="stats-badge">Навыков: {{ skills_count }}</div>
    </div>

    <div class="skills-container">
        {% for skill in skills %}
        <div class="skill-card" data-delay="{{ loop.index0 * 0.1 }}"
            onclick="window.location.href='/user/{{ request.path_params.telegram_id }}/skill/{{ skill.id }}'" 
            style="cursor: pointer;">
            <div class="skill-header">
                <span class="skill-name">{{ skill.name }}</span>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="skill-level" data-level="{{ skill.level }}">Lvl {{ skill.level }}</span>
                </div>
            </div>
            
            <div class="progress-track">
                <div class="progress-fill" data-level="{{ skill.level }}" data-width="{{ skill.xp_percent }}"></div>
            </div>
            
            <div class="skill-xp-text">
                {{ skill.xp_text }} XP
            </div>
        </div>
        {% else %}
        <div class="empty-state">
            Дерево навыков пока пусто.<br>Начни изучение!
        </div>
        {% endfor %}
    </div>

    <div class="add-skill-container">
        <input type="text" id="newSkillName" class="add-skill-input" placeholder="Название навыка (например: Python)">
        <button class="add-skill-btn" onclick="createNewSkill()">+</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0b0c10'); 
        tg.setBackgroundColor('#0b0c10');
        tg.ready();

        function getLevelStyles(level) {
            if (level < 10) return { bg: '#8b8c9a', shadow: 'none' }; 
            if (level < 20) return { bg: '#a6e3a1', shadow: '0 0 8px rgba(166,227,161,0.5)' }; 
            if (level < 30) return { bg: '#89b4fa', shadow: '0 0 8px rgba(137,180,250,0.5)' }; 
            if (level < 40) return { bg: '#00ffcc', shadow: '0 0 10px rgba(0,255,204,0.5)' };  
            if (level < 50) return { bg: '#cba6f7', shadow: '0 0 10px rgba(203,166,247,0.5)' }; 
            if (level < 60) return { bg: '#f5c2e7', shadow: '0 0 10px rgba(245,194,231,0.5)' }; 
            if (level < 70) return { bg: '#f9e2af', shadow: '0 0 10px rgba(249,226,175,0.5)' }; 
            if (level < 80) return { bg: '#fab387', shadow: '0 0 10px rgba(250,179,135,0.5)' }; 
            if (level < 90) return { bg: '#f38ba8', shadow: '0 0 10px rgba(243,139,168,0.5)' }; 
            if (level < 100) return { bg: '#eba0ac', shadow: '0 0 12px rgba(235,160,172,0.6)' }; 
            
            if (level < 150) return { bg: 'linear-gradient(90deg, #ff007f, #7928ca, #00ffcc)', shadow: '0 0 15px rgba(121,40,202,0.7)' };
            return { bg: 'linear-gradient(270deg, #ff00cc, #3333ff, #00ffcc, #ff00cc)', shadow: '0 0 20px rgba(51,51,255,0.8)' };
        }

        document.querySelectorAll('.skill-card').forEach(card => {
            const delay = card.getAttribute('data-delay');
            if (delay) card.style.animationDelay = delay + 's';
        });

        document.querySelectorAll('.progress-fill').forEach((fill, index) => {
            const level = parseInt(fill.getAttribute('data-level') || 0);
            const badge = document.querySelectorAll('.skill-level')[index];
            const styles = getLevelStyles(level);

            fill.style.background = styles.bg;
            fill.style.boxShadow = styles.shadow;

            if (styles.bg.includes('gradient')) {
                badge.style.background = styles.bg;
                badge.style.webkitBackgroundClip = 'text';
                badge.style.webkitTextFillColor = 'transparent';
                badge.style.backgroundSize = '300% 300%';
                badge.style.animation = 'gradientShift 4s ease infinite';
                fill.style.backgroundSize = '300% 300%';
                fill.style.animation = 'gradientShift 4s ease infinite';
            } else {
                badge.style.color = styles.bg;
            }

            const width = fill.getAttribute('data-width');
            if (width) {
                setTimeout(() => {
                    fill.style.width = width + '%';
                }, 150);
            }
        });

        async function createNewSkill() {
            const input = document.getElementById('newSkillName');
            const skillName = input.value.trim();
            if (!skillName) return; 

            const pathParts = window.location.pathname.split('/');
            const userId = pathParts[pathParts.length - 1];

            try {
                const response = await fetch(`/user/${userId}/add_skill`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: skillName })
                });

                if (response.ok) {
                    window.location.reload();
                } else {
                    alert("Ошибка при добавлении навыка");
                }
            } catch (error) { console.error("Fetch error:", error); }
        }
    </script>
</body>
</html>
